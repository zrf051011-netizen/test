name: dormitory-system

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_ROOT_HOST: "%"
      LANG: C.utf8
      LC_ALL: C.utf8
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - dormitory_mysql_data:/var/lib/mysql
      - ./docker/mysql/charset.cnf:/etc/mysql/conf.d/charset.cnf:ro
      - ./sql/dormitory_system.sql:/docker-entrypoint-initdb.d/01-dormitory-system.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: dormitory-system:local
    restart: unless-stopped
    init: true
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      CATALINA_OPTS: >-
        -Dfile.encoding=UTF-8
        -Duser.timezone=Asia/Shanghai
        -Djava.awt.headless=true
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

volumes:
  dormitory_mysql_data:
